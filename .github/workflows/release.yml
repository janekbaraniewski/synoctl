name: Release

# Triggers (in priority order of how releases actually happen here):
#   - workflow_call: invoked directly from release-please.yaml the moment
#     it cuts a tag. This is the path that runs after a normal merge of
#     the release PR — no PAT needed, no anti-loop GITHUB_TOKEN issue,
#     because workflow_call is exempt from the "no downstream workflows
#     from GITHUB_TOKEN events" rule.
#   - push of a v* tag: covers manual tag pushes, the case where a
#     maintainer cuts a tag from the CLI without going through
#     release-please.
#   - workflow_dispatch: emergency manual rerun if the release-please-
#     triggered run failed and you want to retry against an existing
#     tag without touching git.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release against (e.g. v0.2.3). Defaults to the current ref."
        required: false
        type: string
  workflow_call:
    inputs:
      tag:
        description: "Tag the caller just created — release.yml checks it out and goreleases against it."
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # cosign keyless signing wants the OIDC token
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # When called from release-please.yaml (workflow_call) or via
          # workflow_dispatch with a tag input, check out the tag itself
          # so goreleaser's {{ .Tag }} / {{ .Version }} render correctly.
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Publish release artifacts
        uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.15.2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: release
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      REPO: ${{ github.repository }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Skip when Homebrew token is unavailable
        if: env.HOMEBREW_TAP_TOKEN == ''
        run: echo "HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew tap update."

      - uses: actions/checkout@v6
        if: env.HOMEBREW_TAP_TOKEN != ''

      - name: Get version from tag
        if: env.HOMEBREW_TAP_TOKEN != ''
        id: version
        run: echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for release assets to be available
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for i in $(seq 1 30); do
            ASSETS=$(gh release view "${TAG_NAME}" --repo "${REPO}" --json assets -q '.assets[].name' 2>/dev/null || true)
            if echo "$ASSETS" | grep -q "synoctl_${VERSION}_darwin_arm64.tar.gz" && \
               echo "$ASSETS" | grep -q "synoctl_${VERSION}_darwin_amd64.tar.gz" && \
               echo "$ASSETS" | grep -q "synoctl_${VERSION}_linux_arm64.tar.gz" && \
               echo "$ASSETS" | grep -q "synoctl_${VERSION}_linux_amd64.tar.gz"; then
              echo "All release assets found."
              exit 0
            fi
            echo "Waiting for release assets... attempt $i/30"
            sleep 10
          done
          echo "Timed out waiting for release assets"
          exit 1

      - name: Download release assets and compute checksums
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p /tmp/release-assets
          cd /tmp/release-assets

          gh release download "${TAG_NAME}" \
            --repo "${REPO}" \
            --pattern "synoctl_${VERSION}_darwin_amd64.tar.gz" \
            --pattern "synoctl_${VERSION}_darwin_arm64.tar.gz" \
            --pattern "synoctl_${VERSION}_linux_amd64.tar.gz" \
            --pattern "synoctl_${VERSION}_linux_arm64.tar.gz"

          {
            echo "SHA_DARWIN_AMD64=$(sha256sum synoctl_${VERSION}_darwin_amd64.tar.gz | awk '{print $1}')"
            echo "SHA_DARWIN_ARM64=$(sha256sum synoctl_${VERSION}_darwin_arm64.tar.gz | awk '{print $1}')"
            echo "SHA_LINUX_AMD64=$(sha256sum synoctl_${VERSION}_linux_amd64.tar.gz | awk '{print $1}')"
            echo "SHA_LINUX_ARM64=$(sha256sum synoctl_${VERSION}_linux_arm64.tar.gz | awk '{print $1}')"
          } >> "$GITHUB_ENV"

      - name: Generate Homebrew formula
        if: env.HOMEBREW_TAP_TOKEN != ''
        run: |
          VERSION=${{ steps.version.outputs.version }}
          scripts/generate_homebrew_formula.sh \
            --formula-name synoctl \
            --formula-class Synoctl \
            --binary synoctl \
            --desc "A TUI-first management tool for Synology DSM" \
            --homepage "https://github.com/${REPO}" \
            --version "${VERSION}" \
            --repo "${REPO}" \
            --license "MIT" \
            --sha-darwin-amd64 "${SHA_DARWIN_AMD64}" \
            --sha-darwin-arm64 "${SHA_DARWIN_ARM64}" \
            --sha-linux-amd64 "${SHA_LINUX_AMD64}" \
            --sha-linux-arm64 "${SHA_LINUX_ARM64}" \
            --output /tmp/homebrew-formula/synoctl.rb

      - name: Validate Homebrew formula syntax
        if: env.HOMEBREW_TAP_TOKEN != ''
        run: ruby -c /tmp/homebrew-formula/synoctl.rb

      - name: Push formula to Homebrew tap
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone --branch master "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/janekbaraniewski/homebrew-tap.git" /tmp/homebrew-tap
          mkdir -p /tmp/homebrew-tap/Formula
          cp /tmp/homebrew-formula/synoctl.rb /tmp/homebrew-tap/Formula/synoctl.rb

          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/synoctl.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update synoctl to ${{ steps.version.outputs.version }}"
          git push
